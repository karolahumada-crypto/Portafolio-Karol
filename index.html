<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Karol</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html{scroll-behavior:smooth;}

/* ===== FONDO ===== */
body{
  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a40);
  background-size:400% 400%;
  animation:fondo 12s ease infinite;
  color:white;
  font-family:Arial;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAV */
.navbar-pro{
display:flex;
justify-content:center;
gap:20px;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

.navbar-pro a{
color:white;
text-decoration:none;
font-weight:bold;
}

.navbar-pro a:hover{
color:#c084fc;
transform:scale(1.1);
}

/* HEADER */
header{text-align:center;padding:40px;}

header img{
width:150px;height:150px;
border-radius:50%;
border:4px solid #22d3ee;
box-shadow:0 0 25px #22d3ee;
}

/* BOTONES */
.social-btn{
padding:10px 18px;
margin:5px;
border-radius:20px;
background:linear-gradient(90deg,#22d3ee,#a855f7);
color:white;
text-decoration:none;
display:inline-block;
}

.social-btn:hover{
transform:scale(1.1);
box-shadow:0 0 15px #a855f7;
}

/* SECCIONES */
section{
width:80%;
margin:30px auto;
padding:25px;
background:rgba(0,0,0,0.5);
border-radius:15px;
box-shadow:0 0 20px rgba(34,211,238,0.3);
}

section:hover{
box-shadow:0 0 30px rgba(168,85,247,0.5);
}

/* CARDS */
.card-custom{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
margin-top:10px;
}

/* INPUTS */
input, textarea, select{
background:rgba(0,0,0,0.7)!important;
color:white!important;
border:1px solid rgba(168,85,247,0.3)!important;
}

/* BOTON TOP */
.btn-top{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(#22d3ee,#a855f7);
color:white;
border:none;
border-radius:50%;
width:45px;height:45px;
display:none;
}

.btn-top.show{display:block;}

.fade-in{opacity:0;transform:translateY(40px);transition:0.8s;}
.fade-in.visible{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<nav class="navbar-pro">
<a href="#">Inicio</a>
<a href="#proyectos">Proyectos</a>
<a href="#certificados">Certificados</a>
<a href="#reseñas">Reseñas</a>
<a href="#contacto">Contacto</a>
</nav>

<header class="fade-in">
<img src="Foto Portafolio.png">
<h1 class="mt-3">Karol Andrea Ahumada Cruz</h1>
<p>Game Tester | QA Analyst</p>

<div>
<a href="#" class="social-btn">GitHub</a>
<a href="#" class="social-btn">Facebook</a>
<a href="#" class="social-btn">Instagram</a>
<a href="#" class="social-btn">WhatsApp</a>
</div>
</header>

<main>

<section class="fade-in">
<h2>Resumen Profesional</h2>
<p>Analista QA con experiencia en testing de software y videojuegos.</p>
</section>
